stages:
  - verify
  - build

variables:
  DOCKER_DRIVER: overlay2

services:
  - docker:dind

before_script:
  - docker info

frontend_verify:
  stage: verify
  image: node:20-alpine
  before_script: []
  script:
    - cd services/frontend
    - npm ci
    - npm run lint
    - npm run build

build_socket_gateway:
  stage: build
  image: docker:24
  script:
    - docker build -t socket-gateway ./services/socket-gateway

build_message_worker:
  stage: build
  image: docker:24
  script:
    - docker build -t message-worker ./services/message-worker

build_api_service:
  stage: build
  image: docker:24
  script:
    - docker build -t api-service ./services/api-service
